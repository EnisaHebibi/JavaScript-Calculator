<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>ANIMATION</title>
  </head>
  <body>
    <h1 id="animation">Simple Animation</h1>

    <script>
      var animation = document.getElementById("animation");
      animation.style.position = "absolute";
      var frame = 0;

      function nextFrame() {
        if (frame++ < 20) {
          animation.style.left = 10 * frame + "px";
          setTimeout("nextFrame()", 50);
        } else {
          animation.style.visibility = "hidden";
        }
      }

      nextFrame();
    </script>
  </body>
</html>
